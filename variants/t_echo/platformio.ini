[nrf52]
platform = nordicnrf52
board = nrf52840_dk_adafruit
framework = arduino

[env:t_echo]
extends = nrf52

lib_ignore =
    AceButton
    Adafruit TCA8418
	epdiy
    es7210
    ESP32-audioI2S
	GxEPD2
    lvgl
    SensorLibTDECKPro
    TFT_eSPI
    Timeout
    TinyGSM
    XPowersLib

lib_deps = 
	${libs.lib_deps}
	${nrf52libs.lib_deps}

	; Display Library
	https://github.com/ZinggJM/GxEPD

lib_archive = no
build_flags = 
	${nrf52.build_flags}
	${common.build_flags}

	-I src/nrf52
	-I variants/${this.__env__}
	
	-D BOARD_T_ECHO="T_ECHO"

	-D SERIAL_BUFFER_SIZE=250
